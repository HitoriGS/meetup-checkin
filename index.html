<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Twitch Meetup 報到</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0e0e1a;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  header {
    background: #9147ff;
    padding: 14px 16px;
    text-align: center;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 16px;
  }

  /* ── Scanner ── */
  #scanner-wrap {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #camera-box {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #9147ff;
    background: #000;
    display: none;
  }

  #qr-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* viewfinder overlay */
  #camera-box::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(#9147ff, #9147ff) top    left  / 24px 3px no-repeat,
      linear-gradient(#9147ff, #9147ff) top    left  / 3px 24px no-repeat,
      linear-gradient(#9147ff, #9147ff) top    right / 24px 3px no-repeat,
      linear-gradient(#9147ff, #9147ff) top    right / 3px 24px no-repeat,
      linear-gradient(#9147ff, #9147ff) bottom left  / 24px 3px no-repeat,
      linear-gradient(#9147ff, #9147ff) bottom left  / 3px 24px no-repeat,
      linear-gradient(#9147ff, #9147ff) bottom right / 24px 3px no-repeat,
      linear-gradient(#9147ff, #9147ff) bottom right / 3px 24px no-repeat;
    pointer-events: none;
  }

  #scan-hint {
    color: #888;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  /* ── Result Panel ── */
  #result-panel {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 340px;
    background: #1a1a2e;
    border-radius: 20px;
    padding: 32px 24px 24px;
    text-align: center;
    gap: 8px;
  }

  .status-icon  { font-size: 60px; margin-bottom: 4px; }
  .name-text    { font-size: 26px; font-weight: 700; }
  .ticket-text  { font-size: 13px; color: #9147ff; letter-spacing: 0.5px; }
  .msg-text     { font-size: 14px; color: #aaa; margin-top: 4px; line-height: 1.5; }
  .msg-text.warn  { color: #f90; }
  .msg-text.error { color: #f55; }

  .btn {
    margin-top: 12px;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active   { opacity: 0.7; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-confirm    { background: #9147ff; color: #fff; }
  .btn-rescan     { background: #2a2a3e; color: #bbb; margin-top: 8px; }
  .btn-camera-on  { background: #9147ff; color: #fff; max-width: 340px; }
  .btn-camera-off { background: #3a1a6e; color: #c4a0f5; max-width: 340px; }

  #checkin-count {
    flex-shrink: 0;
    padding: 16px;
    text-align: center;
    font-size: 14px;
    color: #fff;
  }
  #checkin-count span {
    font-size: 32px;
    font-weight: 700;
    color: #9147ff;
    display: block;
    margin-bottom: 2px;
  }

  footer {
    flex-shrink: 0;
    padding: 8px 16px 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0.35;
  }
  footer svg { width: 120px; height: auto; }
</style>
</head>
<body>

<header>
  <h1>Twitch Meetup 報到</h1>
  <p>掃描票券 QR Code 完成報到</p>
</header>

<div id="main">
  <div id="scanner-wrap">
    <div id="camera-box">
      <video id="qr-video" autoplay muted playsinline></video>
    </div>
    <p id="scan-hint">請將 QR Code 對準鏡頭</p>
    <button class="btn btn-camera-on" id="btn-camera" onclick="toggleCamera()">開啟相機掃描</button>
  </div>

  <div id="result-panel">
    <div class="status-icon" id="icon"></div>
    <div class="name-text"   id="name"></div>
    <div class="ticket-text" id="ticket"></div>
    <div class="msg-text"    id="msg"></div>
    <button class="btn btn-confirm" id="btn-confirm" onclick="confirmCheckin()">確認報到</button>
    <button class="btn btn-rescan"  id="btn-rescan"  onclick="resumeScanning()">重新掃描</button>
  </div>
</div>

<div id="checkin-count">
  <span id="count-num">—</span>
  今日已報到人數
</div>

<script>
const BASE = 'https://hitorigs.zeabur.app';

let videoStream   = null;
let scanInterval  = null;
let scanning      = false;
let pendingTicket = null;
let detector      = null;

/* ── Scanner lifecycle ─────────────────────────────── */

const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d');

async function startScanner() {
  document.getElementById('camera-box').style.display = 'block';
  document.getElementById('scan-hint').style.display  = 'block';
  setCameraBtn(true);

  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('此瀏覽器不支援相機，請使用 Safari 或 Chrome');
    }

    // 從最簡單的 constraint 開始，依序 fallback，避免 iOS TypeError
    const attempts = [
      { video: { facingMode: 'environment' } },
      { video: true }
    ];
    for (const c of attempts) {
      try { videoStream = await navigator.mediaDevices.getUserMedia(c); break; }
      catch (e) { if (attempts.indexOf(c) === attempts.length - 1) throw e; }
    }

    const video = document.getElementById('qr-video');
    video.srcObject = videoStream;
    await video.play();

    scanning = true;
    startDetecting(video);

  } catch (err) {
    const msg = err.name === 'NotAllowedError'
      ? '請允許相機權限後重試'
      : '無法開啟相機：' + (err.message || err);
    document.getElementById('scan-hint').textContent = msg;
    document.getElementById('camera-box').style.display = 'none';
    setCameraBtn(false);
  }
}

function startDetecting(video) {
  // BarcodeDetector：Chrome 83+ / Edge 83+
  if ('BarcodeDetector' in window) {
    detector = new BarcodeDetector({ formats: ['qr_code'] });
    scanInterval = setInterval(async () => {
      if (!scanning || video.readyState < 2) return;
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) onScanSuccess(codes[0].rawValue);
      } catch (_) {}
    }, 250);
    return;
  }

  // jsQR fallback：iOS Safari / Firefox 等
  if (typeof jsQR === 'undefined') {
    setTimeout(() => startDetecting(video), 300);
    return;
  }

  scanInterval = setInterval(() => {
    if (!scanning || video.readyState < 2 || video.videoWidth === 0) return;
    offCanvas.width  = video.videoWidth;
    offCanvas.height = video.videoHeight;
    offCtx.drawImage(video, 0, 0);
    const img  = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code) onScanSuccess(code.data);
  }, 150);
}

function stopScanner() {
  scanning = false;
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (videoStream)  { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  const video = document.getElementById('qr-video');
  video.srcObject = null;
  setCameraBtn(false);
}

function toggleCamera() {
  if (scanning) {
    stopScanner();
    document.getElementById('camera-box').style.display = 'none';
    document.getElementById('scan-hint').style.display  = 'none';
  } else {
    startScanner();
  }
}

function setCameraBtn(isOn) {
  const btn = document.getElementById('btn-camera');
  if (isOn) {
    btn.textContent = '關閉相機';
    btn.className   = 'btn btn-camera-off';
  } else {
    btn.textContent = '開啟相機掃描';
    btn.className   = 'btn btn-camera-on';
  }
}

function resumeScanning() {
  pendingTicket = null;
  show('scanner');
  startScanner();
}

/* ── QR scan handler ───────────────────────────────── */

async function onScanSuccess(text) {
  if (!scanning) return;   // 避免重複觸發
  stopScanner();
  document.getElementById('camera-box').style.display = 'none';
  document.getElementById('scan-hint').style.display  = 'none';

  const suffix = extractSuffix(text);
  showLoading();

  try {
    const res  = await fetch(BASE + '/webhook/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ suffix })
    });
    const data = await res.json();
    renderResult(data);
  } catch (e) {
    renderError('網路錯誤，請重試');
  }
}

function extractSuffix(qrText) {
  const digits = qrText.replace(/\D/g, '');
  return digits.slice(-5);
}

/* ── Result rendering ──────────────────────────────── */

function showLoading() {
  show('result');
  set('icon',   '⏳');
  set('name',   '查詢中…');
  set('ticket', '');
  set('msg',    '', '');
  hide('btn-confirm');
  hide('btn-rescan');
}

function renderResult(data) {
  show('result');

  if (!data.found) {
    set('icon',   '❌');
    set('name',   '查無此票券');
    set('ticket', '');
    set('msg',    '請確認 QR Code 是否正確', 'error');
    hide('btn-confirm');
    show('btn-rescan');
    return;
  }

  pendingTicket = data.ticketNumber;
  set('name',   data.name);
  set('ticket', data.ticketNumber);

  if (data.checkedIn) {
    set('icon', '⚠️');
    set('msg',  '已於 ' + data.checkinTime + ' 報到過', 'warn');
    hide('btn-confirm');
  } else {
    set('icon', '✅');
    set('msg',  '尚未報到，確認身份後請按下方按鈕');
    show('btn-confirm');
    document.getElementById('btn-confirm').disabled    = false;
    document.getElementById('btn-confirm').textContent = '確認報到';
  }
  show('btn-rescan');
}

function renderError(message) {
  set('icon',   '❌');
  set('name',   '發生錯誤');
  set('ticket', '');
  set('msg',    message, 'error');
  hide('btn-confirm');
  show('btn-rescan');
}

/* ── Confirm check-in ──────────────────────────────── */

async function confirmCheckin() {
  if (!pendingTicket) return;

  const btn = document.getElementById('btn-confirm');
  btn.disabled    = true;
  btn.textContent = '處理中…';

  try {
    const res  = await fetch(BASE + '/webhook/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketNumber: pendingTicket })
    });
    const data = await res.json();

    if (data.success) {
      set('icon', '🎉');
      set('msg',  '報到成功！3 秒後自動繼續掃描');
      hide('btn-confirm');
      fetchCount();
      setTimeout(resumeScanning, 3000);
    } else {
      btn.disabled    = false;
      btn.textContent = '確認報到';
      set('msg', '報到失敗，請重試', 'error');
    }
  } catch (e) {
    btn.disabled    = false;
    btn.textContent = '確認報到';
    set('msg', '網路錯誤，請重試', 'error');
  }
}

/* ── UI helpers ────────────────────────────────────── */

function show(id) {
  if (id === 'scanner') {
    document.getElementById('scanner-wrap').style.display = 'flex';
    document.getElementById('result-panel').style.display = 'none';
  } else if (id === 'result') {
    document.getElementById('scanner-wrap').style.display = 'none';
    document.getElementById('result-panel').style.display = 'flex';
  } else {
    const el = document.getElementById(id);
    if (el) el.style.display = '';
  }
}

function hide(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

function set(id, text, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  if (cls !== undefined) {
    el.className = el.className.replace(/\b(warn|error)\b/g, '').trim();
    if (cls) el.className += ' ' + cls;
  }
}

/* ── Today's count ─────────────────────────────────── */

async function fetchCount() {
  try {
    const res  = await fetch(BASE + '/webhook/count');
    const data = await res.json();
    document.getElementById('count-num').textContent = data.count ?? '—';
  } catch (_) {}
}

fetchCount();
</script>
